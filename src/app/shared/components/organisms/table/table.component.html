<div class="table-container">
    <table>
        <thead>
            <tr>
                <th *ngFor="let col of columns">{{ col.label }}</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let item of data" [class.is-inactive]="$any(item).status === 'INACTIVE'">
                <td *ngFor="let col of columns">
                    <ng-container [ngSwitch]="col.key">
                        <span *ngSwitchCase="'status'" [className]="'badge badge--' + $any(item[col.key]).toLowerCase()">
                            {{ $any(item[col.key]) === 'ACTIVE' ? 'Activo' : 'Inactivo' }}
                        </span>
                        <span *ngSwitchDefault>{{ item[col.key] }}</span>
                    </ng-container>
                </td>

                <td>
                    <div class="actions">
                        <button class="action-btn edit" title="Editar" (click)="edit.emit(item)">
                            <span class="material-icons">edit</span>
                        </button>
                        <button class="action-btn toggle" title="Cambiar Estado" (click)="toggle.emit(item)">
                            <span class="material-icons">sync_alt</span>
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
