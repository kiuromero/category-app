<div class="overlay" *ngIf="isOpen" (click)="onClose()">
    <div class="modal" (click)="$event.stopPropagation()">
        <div class="header">
            <h3>{{ title }}</h3>
            <button class="close-btn" (click)="onClose()">
                <span class="material-icons">close</span>
            </button>
        </div>

        <div class="content">
            <ng-content></ng-content>
        </div>
    </div>
</div>
